{% extends 'base.html' %}

{% block title %}Delete Post{% endblock %}

{% block content %}

<h2>Delete Post</h2>

<p>Are you sure you want to delete this post?</p>

<h4>{{ post.title }}</h4>

<form method="POST">

    {% csrf_token %}

    <button type="submit" class="btn btn-danger">
        Yes, Delete
    </button>

    <a href="{% url 'post_detail' post.id %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
